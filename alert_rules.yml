# docker/alert_rules.yml
# --------------------------------------------------------
# Prometheus alerting rules for the sentiment service
# --------------------------------------------------------

groups:
  - name: sentiment_alerts
    rules:

      # Alert if API is down
      - alert: SentimentAPIDown
        expr: up{job="sentiment_api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Sentiment API is down"
          description: "The FastAPI inference server has been unreachable for 1 minute."

      # Alert if error rate exceeds 5%
      - alert: HighErrorRate
        expr: >
          rate(http_requests_total{job="sentiment_api", status=~"5.."}[5m])
          /
          rate(http_requests_total{job="sentiment_api"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate (>5%)"
          description: "Error rate has exceeded 5% for more than 2 minutes."

      # Alert if positive ratio drops sharply (possible drift)
      - alert: SentimentDriftDetected
        expr: sentiment_positive_ratio < 0.1 or sentiment_positive_ratio > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Possible data drift detected"
          description: "Positive prediction ratio is outside the 10%-90% range for 5 minutes."

      # Alert if p99 latency exceeds 500ms
      - alert: HighInferenceLatency
        expr: >
          histogram_quantile(0.99,
            rate(sentiment_prediction_latency_seconds_bucket[5m])
          ) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Inference p99 latency > 500ms"
          description: "99th-percentile inference latency has exceeded 500ms for 3 minutes."
